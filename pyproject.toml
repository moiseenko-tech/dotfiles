[tool.black]
line-length = 120
target-version = ["py314"]

[tool.ruff]
extend-exclude = ["__pycache__"]

# Same as Black
line-length = 120
indent-width = 4
target-version = "py314"

[tool.ruff.format]
# Like Black, use double quotes for strings
quote-style = "double"

# Like Black, indent with spaces, rather than tabs
indent-style = "space"

# Like Black, respect magic trailing commas
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending
line-ending = "auto"

# docstring-code-format = false
# docstring-code-line-length = "dynamic"

[tool.ruff.lint]
# List of enabled rules.
# https://docs.astral.sh/ruff/rules/
select = [
    "ERA",      # eradicate
    "YTT",      # flake8-2020
    "ANN",      # flake8-annotations
    "ASYNC",    # flake8-async
    "S",        # flake8-bandit
    "BLE",      # flake8-blind-except
    "FBT",      # flake8-boolean-trap
    "B",        # flake8-bugbear
    "A",        # flake8-builtins
    "COM",      # flake8-commas
    "C4",       # flake8-comprehensions
    "DTZ",      # flake8-datetimez
    "T10",      # flake8-debugger
    "EM",       # flake8-errmsg
    "EXE",      # flake8-executable
    "FIX",      # flake8-fixme
    "INT",      # flake8-gettext
    "ISC",      # flake8-implicit-str-concat
    "ICN",      # flake8-import-conventions
    "LOG",      # flake8-logging
    "G",        # flake8-logging-format
    "INP",      # flake8-no-pep420
    "PIE",      # flake8-pie
    "T20",      # flake8-print
    "PT",       # flake8-pytest-style
    "Q",        # flake8-quotes
    "RSE",      # flake8-raise
    "RET",      # flake8-return
    "SLF",      # flake8-self
    "SIM",      # flake8-simplify
    "SLOT",     # flake8-slots
    "TID",      # flake8-tidy-imports
    "TD",       # flake8-todos
    "TC",       # flake8-type-checking
    "ARG",      # flake8-unused-arguments
    "PTH",      # flake8-use-pathlib
    "FLY",      # flynt
    "I",        # isort
    "C90",      # mccabe
    "N",        # pep8-naming
    "PERF",     # Perflint
    "E",        # pycodestyle (Error)
    "W",        # pycodestyle (Warning)
    "D",        # pydocstyle
    "F",        # Pyflakes
    "PGH",      # pygrep-hooks
    "PL",       # Pylint (PLC, PLR, PLE, PLW)
    "UP",       # pyupgrade
    "FURB",     # refurb
    "RUF",      # Ruff-specific rules
    "TRY",      # tryceratops

    # Software and versions related
    # "AIR",    # Airflow
    # "FAST",   # FastAPI
    # "DJ",     # flake8-django
    # "FA",     # flake8-future-annotations
    # "PYI",    # flake8-pyi
    # "NPY",    # NumPy-specific rules
    # "PD",     # pandas-vet

    # Only available in preview
    # "CPY",    # flake8-copyright
    # "DOC",    # pydoclint
]

ignore = [
    "D107",     # undocumented-public-init
    "EM101",    # exception-string-literal
    "FIX002",   # line-contains-todo
    "TD003",    # missing-todo-link

    # WARNING: Docstring rules temporarily disabled for rapid prototyping.
    #          These MUST be restored before release. Shipping without them
    #          is strictly prohibited.
    "D100",  # undocumented-public-module
    "D101",  # undocumented-public-class
    "D102",  # undocumented-public-method
    "D103",  # undocumented-public-function
    "D104",  # undocumented-public-package
    "D105",  # undocumented-magic-method
    "D106",  # undocumented-public-nested-class
]

# Allow fix for all enabled rules (when --fix is provided)
fixable = ["ALL"]
unfixable = []

# Only ignore variables named "_".
dummy-variable-rgx = "^_$"

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "ANN001",   # missing-type-annotation-for-argument
    "ANN201",   # missing-return-type-annotation
    "ARG001",   # unused-function-argument
    "D100",     # undocumented-public-module
    "D104",     # undocumented-public-package
    "PLR2004",  # magic-value-comparison
    "S101",     # assert
    "S105",     # hardcoded-password-string
    "S106",     # hardcoded-password-func-arg
    "SLF001",   # private-member-access
    # In tests, imports are used at runtime (e.g. in fixture type annotations,
    # parametrize values, isinstance checks), so wrapping them in TYPE_CHECKING
    # would cause NameError at runtime. Direct imports are correct here.
    "TC001",    # move-application-import-into-type-checking-block
    "TC002",    # move-third-party-import-into-type-checking-block
]

"scripts/*" = [
    "B007",     # unused-loop-control-variable
    "BLE001",   # blind-except
    "PLR0915",  # too-many-statements
    "PLR2004",  # magic-value-comparison
    "RUF001",   # ambiguous-unicode-character-string
    "S608",     # hardcoded-sql-expression
    "T201",     # print
    "TRY300",   # try-consider-else
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.uv]
package = true
